name: Smart DQ Assistant CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic groq pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 dq_engine/ llm_layer/ --max-line-length=120 --ignore=E501,W503